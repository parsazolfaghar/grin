name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System deps (Qt runtime for offscreen PyQt6)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # app extra (PyQt6) so the GUI tests run; docker extra not needed (live-only paths are skipped)
          pip install -e ".[dev,app]"
      - name: Lint (ruff)
        run: ruff check grin/ tests/
      - name: Test (pytest, offscreen Qt)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q
