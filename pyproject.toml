[project]
name = "ronin"
version = "0.1.0"
description = "Local-only multi-agent autonomous red-team orchestrator — engagement spine (SP1)"
requires-python = ">=3.12"
dependencies = ["pyyaml>=6.0", "httpx>=0.27"]

[project.optional-dependencies]
dev = ["pytest>=8.0"]
docker = ["docker>=7.0"]

[project.scripts]
ronin = "ronin.cli:main"

[tool.setuptools.packages.find]
include = ["ronin*"]

[tool.pytest.ini_options]
pythonpath = ["."]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
