# osint.yaml — a passive-only (OSINT) own-lab engagement using the docker runner.
# allowed_actions is just [passive], so the spine permits OSINT tools (whois/dig/host/
# theHarvester/amass) and refuses anything more intrusive. Tools run inside the named
# container (install them with e.g. `docker exec ronin-kali apt-get install -y whois dnsutils`).
id: osint-validate
name: "OSINT validation"
mode: own-lab
scope:
  in:
    - "example.com"
roe:
  allowed_actions: [passive]
autonomy: autonomous
env:
  kind: docker
  container: ronin-kali
audit_log: ./audit/osint.jsonl
state: active
